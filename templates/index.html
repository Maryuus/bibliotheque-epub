<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bibliotheque EPUB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --surface: #161929;
      --surface2: #1e2235;
      --surface3: #252a42;
      --accent: #7c6af7;
      --accent-dim: rgba(124,106,247,0.15);
      --green: #4ade80;
      --red: #f87171;
      --text: #e2e4f0;
      --text2: #7d82a8;
      --border: #252a42;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(13,15,26,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 12px;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-form { display: flex; flex-direction: column; gap: 8px; }

    .field {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      transition: border-color 0.2s;
    }
    .field:focus-within { border-color: var(--accent); }
    .field-icon { color: var(--text2); font-size: 16px; flex-shrink: 0; margin-right: 10px; }
    .field input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16px;
      padding: 13px 0;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: var(--text2); }

    .actions-row {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .lang-toggle {
      display: flex;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.active { background: var(--accent); color: #fff; }

    .search-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .search-btn:active { opacity: 0.8; }
    .search-btn:disabled { background: var(--surface3); color: var(--text2); }

    .spinner {
      width: 17px; height: 17px;
      border: 2.5px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN ── */
    main { padding: 14px; }

    .placeholder {
      text-align: center;
      padding: 60px 20px 40px;
      color: var(--text2);
    }
    .placeholder .icon { font-size: 52px; display: block; margin-bottom: 14px; }
    .placeholder p { font-size: 15px; line-height: 1.5; }

    /* ── RESULTS ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .results-header span { font-size: 13px; color: var(--text2); }
    .badge {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    /* ── BOOK CARD ── */
    .book-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .book-card.open { border-color: var(--accent); }

    .card-body {
      display: flex;
      gap: 12px;
      padding: 14px;
    }

    .cover-wrap {
      flex-shrink: 0;
      width: 60px;
    }
    .cover-wrap img {
      width: 60px;
      height: 82px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface3);
      display: block;
    }
    .cover-placeholder {
      width: 60px;
      height: 82px;
      background: var(--surface3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text2);
    }

    .card-info { flex: 1; min-width: 0; }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--text);
      /* two-line clamp */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-author {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .chip {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      background: var(--surface3);
      color: var(--text2);
    }
    .chip.lang-fr { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .chip.lang-en { background: rgba(74,222,128,0.15); color: var(--green); }
    .chip.epub { background: rgba(124,106,247,0.15); color: #a78bfa; }

    /* ── DOWNLOAD PANEL ── */
    .dl-panel {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .dl-panel.open { display: block; }

    .dl-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 13px;
      padding: 8px 0;
    }
    .mini-spin {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      margin-top: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .dl-btn:active { background: var(--accent-dim); border-color: var(--accent); }
    .dl-btn .dl-icon { font-size: 18px; flex-shrink: 0; }
    .dl-btn .dl-text { flex: 1; }
    .dl-btn .dl-size { font-size: 12px; color: var(--text2); flex-shrink: 0; }

    .dl-error {
      color: var(--red);
      font-size: 13px;
      padding: 8px 0;
    }

    /* ── ERROR / EMPTY ── */
    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      padding: 14px;
      color: var(--red);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">📚 Bibliothèque EPUB</div>
    <form class="search-form" onsubmit="doSearch(event)">
      <div class="field">
        <span class="field-icon">📖</span>
        <input type="text" id="q-title" placeholder="Titre du livre…" autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
      <div class="field">
        <span class="field-icon">✍️</span>
        <input type="text" id="q-author" placeholder="Auteur (optionnel)…" autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
      <div class="actions-row">
        <div class="lang-toggle">
          <button type="button" class="lang-btn active" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
          <button type="button" class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
        </div>
        <button type="submit" class="search-btn" id="searchBtn">
          <span id="searchIcon">🔍</span>
          <span id="searchLabel">Rechercher</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </div>
    </form>
  </header>

  <main>
    <div id="placeholder" class="placeholder">
      <span class="icon">🔍</span>
      <p>Entrez un titre et/ou un auteur<br>pour trouver votre livre en EPUB</p>
    </div>
    <div id="results"></div>
  </main>

  <script>
    let lang = 'fr';

    function setLang(l) {
      lang = l;
      document.getElementById('btn-fr').classList.toggle('active', l === 'fr');
      document.getElementById('btn-en').classList.toggle('active', l === 'en');
    }

    async function doSearch(e) {
      if (e) e.preventDefault();
      const title = document.getElementById('q-title').value.trim();
      const author = document.getElementById('q-author').value.trim();
      if (!title && !author) return;

      setLoading(true);
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('results').innerHTML = '';

      try {
        const params = new URLSearchParams({ title, author, lang });
        const res = await fetch('/api/search?' + params);
        const data = await res.json();

        if (data.error) {
          showError(data.error);
        } else if (!data.results?.length) {
          document.getElementById('results').innerHTML = `
            <div class="placeholder">
              <span class="icon">😕</span>
              <p>Aucun résultat trouvé en EPUB.<br>Essayez l'autre langue ou vérifiez l'orthographe.</p>
            </div>`;
        } else {
          renderResults(data.results);
        }
      } catch {
        showError('Erreur réseau. Vérifiez votre connexion.');
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      document.getElementById('searchBtn').disabled = on;
      document.getElementById('spinner').style.display = on ? 'block' : 'none';
      document.getElementById('searchIcon').style.display = on ? 'none' : 'inline';
      document.getElementById('searchLabel').textContent = on ? 'Recherche…' : 'Rechercher';
    }

    function showError(msg) {
      document.getElementById('results').innerHTML = `<div class="error-box">${esc(msg)}</div>`;
    }

    function renderResults(books) {
      const container = document.getElementById('results');
      const header = el('div', 'results-header', `
        <span>Résultats — EPUB uniquement</span>
        <span class="badge">${books.length} livre${books.length > 1 ? 's' : ''}</span>
      `);
      container.appendChild(header);

      books.forEach((book, idx) => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.id = `card-${idx}`;

        const langChip = book.language
          ? `<span class="chip ${book.language.toLowerCase().includes('french') ? 'lang-fr' : book.language.toLowerCase().includes('english') ? 'lang-en' : ''}">${esc(book.language)}</span>`
          : '';

        const coverHtml = book.cover
          ? `<img src="${esc(book.cover)}" alt="cover" onerror="this.parentNode.innerHTML='<div class=cover-placeholder>📘</div>'">`
          : `<div class="cover-placeholder">📘</div>`;

        card.innerHTML = `
          <div class="card-body">
            <div class="cover-wrap">${coverHtml}</div>
            <div class="card-info">
              <div class="card-title">${esc(book.title)}</div>
              <div class="card-author">${esc(book.author || 'Auteur inconnu')}</div>
              <div class="meta-chips">
                <span class="chip epub">EPUB</span>
                ${book.year ? `<span class="chip">${esc(book.year)}</span>` : ''}
                ${langChip}
                ${book.size ? `<span class="chip">${esc(book.size)}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="dl-panel" id="dl-${idx}">
            <div class="dl-loading"><div class="mini-spin"></div> Chargement du lien…</div>
          </div>
        `;

        card.addEventListener('click', () => toggleCard(card, book, idx));
        container.appendChild(card);
      });
    }

    async function toggleCard(card, book, idx) {
      const panel = document.getElementById(`dl-${idx}`);
      const isOpen = panel.classList.contains('open');

      // Close all
      document.querySelectorAll('.book-card.open').forEach(c => c.classList.remove('open'));
      document.querySelectorAll('.dl-panel.open').forEach(p => p.classList.remove('open'));

      if (isOpen) return;

      card.classList.add('open');
      panel.classList.add('open');

      if (panel.dataset.loaded) return;
      panel.dataset.loaded = '1';

      try {
        const params = new URLSearchParams({ slug: book.slug, book_id: book.book_id || '' });
        const res = await fetch('/api/download?' + params);
        const data = await res.json();

        if (res.status === 403 && data.error === 'login_required') {
          panel.innerHTML = `
            <div class="dl-error">🔒 Compte Z-Library requis pour télécharger.</div>
            <a class="dl-btn" href="${esc(book.detail_url)}" target="_blank">
              <span class="dl-icon">🌐</span>
              <span class="dl-text">Ouvrir sur Z-Library</span>
            </a>`;
          return;
        }

        if (data.error || !data.url) {
          panel.innerHTML = `
            <div class="dl-error">❌ Lien introuvable.</div>
            <a class="dl-btn" href="${esc(book.detail_url)}" target="_blank">
              <span class="dl-icon">🌐</span>
              <span class="dl-text">Ouvrir sur Z-Library</span>
            </a>`;
          return;
        }

        const proxyUrl = '/api/proxy?url=' + encodeURIComponent(data.url);
        panel.innerHTML = `
          <a class="dl-btn" href="${esc(proxyUrl)}" download>
            <span class="dl-icon">⬇️</span>
            <span class="dl-text">Télécharger EPUB</span>
          </a>
          <a class="dl-btn" href="${esc(data.url)}" target="_blank">
            <span class="dl-icon">🔗</span>
            <span class="dl-text">Lien direct</span>
          </a>
        `;
      } catch {
        panel.innerHTML = `<div class="dl-error">❌ Erreur réseau.</div>`;
      }
    }

    function el(tag, cls, html) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html) e.innerHTML = html;
      return e;
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
